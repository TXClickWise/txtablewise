<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TX TableWise — Offline</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fafaf8; color: #333; text-align: center; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    button { padding: 12px 24px; background: #8B4513; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div>
    <h1>Geen verbinding</h1>
    <p>Controleer je internetverbinding en probeer het opnieuw.</p>
    <button onclick="location.reload()">Opnieuw proberen</button>
  </div>
</body>
</html>

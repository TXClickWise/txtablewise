<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TX TableWise — Offline</title>
  <style>
    :root {
      --navy: #11192B;
      --navy-2: #1a2440;
      --gold: #D4A636;
      --fg: #F2EEE4;
      --muted: #A8AEBE;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
      color: var(--fg); text-align: center; padding: 1.5rem;
    }
    .card { max-width: 420px; }
    .mark {
      width: 72px; height: 72px; border-radius: 18px;
      background: var(--navy-2);
      border: 1px solid rgba(212,166,54,0.35);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); font-family: 'Plus Jakarta Sans', Georgia, serif;
      font-weight: 800; font-size: 28px; letter-spacing: 1px;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 30px -12px rgba(212,166,54,0.4);
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 700; }
    p { color: var(--muted); margin: 0 0 1.5rem; line-height: 1.5; }
    button {
      padding: 12px 24px; background: var(--gold); color: var(--navy);
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">TX</div>
    <h1>Geen verbinding</h1>
    <p>Controleer je internetverbinding en probeer het opnieuw. Je werk gaat niet verloren.</p>
    <button onclick="location.reload()">Opnieuw proberen</button>
  </div>
</body>
</html>
